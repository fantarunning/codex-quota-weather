name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
          - name: macOS Apple Silicon
            os: macos-latest
          - name: macOS Intel
            os: macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:electron
      - run: npm run test:app
      - run: npm run test:release
      - run: npm audit --audit-level=high
      - name: Test Windows CMD one-command installer
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set "CODEX_QUOTA_WEATHER_SOURCE_DIR=%GITHUB_WORKSPACE%"
          call install.cmd
      - name: Verify and remove Windows CMD installation
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $installRoot = Join-Path $env:LOCALAPPDATA 'Programs\CodexQuotaWeather'
          $state = Get-Content (Join-Path $installRoot 'state\update-state.json') -Raw | ConvertFrom-Json
          $installedPackage = Get-Content (Join-Path $installRoot "versions\$($state.currentVersion)\package.json") -Raw | ConvertFrom-Json
          $sourcePackage = Get-Content package.json -Raw | ConvertFrom-Json
          if ($installedPackage.version -ne $sourcePackage.version) {
            throw "Installed $($installedPackage.version), expected $($sourcePackage.version)"
          }
          $health = $null
          $deadline = (Get-Date).AddSeconds(30)
          do {
            try {
              $health = Invoke-RestMethod 'http://127.0.0.1:8787/health' -TimeoutSec 2
            } catch {
              Start-Sleep -Seconds 1
            }
          } while (-not $health -and (Get-Date) -lt $deadline)
          if (-not $health.ok) { throw 'Installed panel health check failed' }
          $pluginRoot = Join-Path $env:USERPROFILE 'plugins\quota-weather'
          if (-not (Test-Path (Join-Path $pluginRoot 'scripts\show-quota.ps1'))) {
            throw 'Windows installer did not deploy the /quota plugin'
          }
          $marketplace = Get-Content (Join-Path $env:USERPROFILE '.agents\plugins\marketplace.json') -Raw | ConvertFrom-Json
          if ('quota-weather' -notin @($marketplace.plugins.name)) { throw '/quota marketplace entry is missing' }
          & cmd.exe /d /c ('call "{0}"' -f (Join-Path $installRoot 'uninstall.cmd'))
          if ($LASTEXITCODE -ne 0) { throw 'Windows installed uninstall.cmd failed' }
          Start-Sleep -Seconds 5
          if (Test-Path $installRoot) { throw 'Windows uninstall cleanup failed' }
          if (Test-Path $pluginRoot) { throw 'Windows plugin uninstall cleanup failed' }
          if (Test-Path (Join-Path $env:APPDATA 'CodexQuotaWeather')) { throw 'Windows settings cleanup failed' }
          if (Test-Path (Join-Path $env:APPDATA 'Microsoft\Windows\Start Menu\Programs\Startup\Codex Quota Weather.lnk')) { throw 'Windows startup cleanup failed' }
          if (Test-Path (Join-Path $env:APPDATA 'Microsoft\Windows\Start Menu\Programs\Startup\Quota Window.lnk')) { throw 'Windows legacy startup cleanup failed' }
          if (Select-String -LiteralPath (Join-Path $env:USERPROFILE '.codex\config.toml') -SimpleMatch '[plugins."quota-weather@personal"]' -Quiet) {
            throw 'Windows plugin config cleanup failed'
          }
      - name: Test macOS one-command installer
        if: runner.os == 'macOS'
        shell: bash
        env:
          CODEX_QUOTA_WEATHER_SOURCE_DIR: ${{ github.workspace }}
          CODEX_QUOTA_WEATHER_INSTALL_DIR: ${{ runner.temp }}/Directory With Spaces/CodexQuotaWeather-CI
          CODEX_QUOTA_WEATHER_PLUGIN_HOME: ${{ runner.temp }}/Codex Plugin Home
          CODEX_QUOTA_WEATHER_NO_STARTUP: "1"
          CODEX_QUOTA_WEATHER_NO_LAUNCH: "0"
        run: |
          bash ./install-macos.sh
          CURRENT=$("$CODEX_QUOTA_WEATHER_INSTALL_DIR/runtime/node/bin/node" -p \
            "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8')).currentVersion" \
            "$CODEX_QUOTA_WEATHER_INSTALL_DIR/state/update-state.json")
          test -x "$CODEX_QUOTA_WEATHER_INSTALL_DIR/versions/$CURRENT/node_modules/electron/dist/Electron.app/Contents/MacOS/Electron"
          test -x "$CODEX_QUOTA_WEATHER_PLUGIN_HOME/plugins/quota-weather/scripts/show-quota.sh"
          grep -F '[plugins."quota-weather@personal"]' "$CODEX_QUOTA_WEATHER_PLUGIN_HOME/.codex/config.toml"
          "$CODEX_QUOTA_WEATHER_INSTALL_DIR/runtime/node/bin/node" \
            "$CODEX_QUOTA_WEATHER_INSTALL_DIR/versions/$CURRENT/scripts/smoke-test.js"
          bash "$CODEX_QUOTA_WEATHER_INSTALL_DIR/uninstall-macos.sh"
          test ! -d "$CODEX_QUOTA_WEATHER_INSTALL_DIR"
          test ! -d "$CODEX_QUOTA_WEATHER_PLUGIN_HOME/plugins/quota-weather"
