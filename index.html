<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Codex Quota Panel</title>
    <style>
        /* The body stays fully transparent and the card sits flush with the
           BrowserWindow. Rounded corner pixels therefore reveal the desktop
           instead of reading as a dark outer border. */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: transparent; }
        body {
            box-sizing: border-box; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-app-region: drag;   /* whole window is draggable by default... */
        }

        /* Invisible resize grips sit at the real window edges. Frameless,
           transparent windows have no native resize border on Windows, so each
           grip forwards the cursor movement to the main process. */
        .rz { position: fixed; z-index: 9999; -webkit-app-region: no-drag; }
        .rz-n  { top: 0; left: 10px; right: 10px; height: 10px; cursor: ns-resize; }
        .rz-s  { bottom: 0; left: 10px; right: 10px; height: 10px; cursor: ns-resize; }
        .rz-e  { top: 10px; bottom: 10px; right: 0; width: 10px; cursor: ew-resize; }
        .rz-w  { top: 10px; bottom: 10px; left: 0; width: 10px; cursor: ew-resize; }
        .rz-ne { top: 0; right: 0; width: 14px; height: 14px; cursor: nesw-resize; }
        .rz-nw { top: 0; left: 0; width: 14px; height: 14px; cursor: nwse-resize; }
        .rz-se { bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; }
        .rz-sw { bottom: 0; left: 0; width: 14px; height: 14px; cursor: nesw-resize; }
        /* ...except interactive controls, which opt out below. */

        /* ===== card / portrait / edge-docked weekly quota ===== */
        #edge-dock, #mini { display: none; }
        body.view-card #quota-app-container { display: block; }
        body.view-card #edge-dock, body.view-card #mini { display: none; }
        body.view-mini #edge-dock { display: none; }
        body.view-mini #quota-app-container {
            display: block; position: fixed; inset: 0; width: auto; height: auto; z-index: 0;
            border-radius: 30px; opacity: 1; animation: none;
        }
        body.view-mini #quota-app-container .content { display: none; }
        body.view-mini #mini { display: flex; }
        body.view-dock #mini, body.view-dock .rz { display: none; }
        body.view-dock #quota-app-container {
            display: block; position: fixed; inset: 0; width: auto; height: auto; z-index: 0;
            opacity: 1; animation: none; box-shadow: none;
        }
        body.view-dock #quota-app-container .content { display: none; }
        body.view-dock #quota-app-container .overlay { opacity: 0.18; }
        body.view-dock #edge-dock { display: flex; }

        /* Side HUD: the reference's ring/status hierarchy sits on top of this
           app's live weather scene instead of replacing it with a static skin. */
        #edge-dock {
            position: fixed; inset: 0; z-index: 20; box-sizing: border-box;
            align-items: center; justify-content: flex-start; flex-direction: row;
            padding: 10px 15px 10px 10px;
            cursor: grab; -webkit-app-region: no-drag; user-select: none; touch-action: none; color: #fff;
            overflow: hidden;
            background: rgba(8,18,34,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            -webkit-backdrop-filter: none;
            backdrop-filter: none;
            box-shadow: -15px 0 40px rgba(0,0,0,0.60), inset 1px 1px 20px rgba(255,255,255,0.03), inset -10px 0 30px rgba(0,0,0,0.40);
            transition: background 0.4s cubic-bezier(0.2,0.8,0.2,1), border-color 0.4s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.4s cubic-bezier(0.2,0.8,0.2,1);
        }
        #edge-dock:active { cursor: grabbing; }
        #edge-dock:hover {
            background: rgba(8,18,34,0.11);
            box-shadow: -20px 0 50px rgba(0,0,0,0.80), inset 1px 1px 20px color-mix(in srgb, var(--dock-accent, #60a5fa) 10%, transparent), 0 0 30px color-mix(in srgb, var(--dock-accent, #60a5fa) 15%, transparent);
        }
        #edge-dock::before {
            content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background:
                radial-gradient(circle at 52% 48%, rgba(128,160,220,0.04), transparent 52%),
                linear-gradient(90deg, rgba(2,6,23,0.05), rgba(15,23,42,0.03));
            box-shadow: inset 0 1px 10px rgba(255,255,255,0.05);
        }
        body.view-dock[data-dock-side="right"] #edge-dock,
        body.view-dock[data-dock-side="right"] #quota-app-container { border-radius: 10px 0 0 10px; border-right: 0; }
        body.view-dock[data-dock-side="left"] #edge-dock,
        body.view-dock[data-dock-side="left"] #quota-app-container { border-radius: 0 10px 10px 0; border-left: 0; }
        body.view-dock[data-dock-side="right"] #edge-dock { border-right: 0; border-left-color: color-mix(in srgb, var(--dock-accent, #60a5fa) 40%, transparent); }
        body.view-dock[data-dock-side="right"] #edge-dock:hover { border-left-color: color-mix(in srgb, var(--dock-accent, #60a5fa) 70%, transparent); }
        body.view-dock[data-dock-side="left"] #edge-dock {
            padding: 10px 10px 10px 15px; border-left: 0;
            border-right-color: color-mix(in srgb, var(--dock-accent, #60a5fa) 40%, transparent);
            box-shadow: 15px 0 40px rgba(0,0,0,0.60), inset -1px 1px 20px rgba(255,255,255,0.03), inset 10px 0 30px rgba(0,0,0,0.40);
        }
        body.view-dock[data-dock-side="left"] #edge-dock:hover { border-right-color: color-mix(in srgb, var(--dock-accent, #60a5fa) 70%, transparent); }
        body.view-dock.dock-detached #edge-dock,
        body.view-dock.dock-detached #quota-app-container {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
        }
        #edge-dock::after {
            content: ''; position: absolute; top: 18px; bottom: 18px; width: 3px; z-index: 4;
            border-radius: 0 2px 2px 0; background: var(--dock-accent, #60a5fa);
            box-shadow: 0 0 8px color-mix(in srgb, var(--dock-accent, #60a5fa) 60%, transparent), 0 0 15px color-mix(in srgb, var(--dock-accent, #60a5fa) 60%, transparent); opacity: 0.9;
            transition: top 0.3s ease, bottom 0.3s ease, background 0.3s ease;
            animation: dockAccentBreath 2.6s ease-in-out infinite;
        }
        #edge-dock:hover::after { top: 13px; bottom: 13px; }
        body.view-dock[data-dock-side="right"] #edge-dock::after { left: 0; }
        body.view-dock[data-dock-side="left"] #edge-dock::after { right: 0; border-radius: 2px 0 0 2px; }
        @keyframes dockAccentBreath {
            0%, 100% { opacity: 0.68; box-shadow: 0 0 6px var(--dock-accent, #60a5fa); }
            50% { opacity: 1; box-shadow: 0 0 12px var(--dock-accent, #60a5fa); }
        }
        .dock-hud-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 6px; margin-left: 3px; }
        .dock-ring-shell {
            width: 34px; height: 34px; flex: 0 0 34px; position: relative;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; -webkit-app-region: no-drag;
        }
        .dock-ring { width: 100%; height: 100%; overflow: visible; transform: rotate(-90deg); }
        .dock-ring-track, .dock-ring-progress { fill: none; cx: 16px; cy: 16px; r: 13px; }
        .dock-ring-track { stroke: rgba(255,255,255,0.13); stroke-width: 2.3; }
        .dock-ring-progress {
            stroke: var(--dock-accent, #60a5fa); stroke-width: 2.3; stroke-linecap: round;
            stroke-dasharray: 81.68; stroke-dashoffset: 81.68;
            filter: drop-shadow(0 0 3px color-mix(in srgb, var(--dock-accent, #60a5fa) 70%, transparent));
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1), stroke 0.45s ease;
        }
        #dock-pct {
            position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center;
            padding-top: 1px; box-sizing: border-box;
            font-family: 'Cascadia Mono', 'SFMono-Regular', Consolas, monospace;
            font-size: 12px; line-height: 1; font-weight: 700; letter-spacing: -0.35px;
            color: rgba(219,234,254,0.96); font-variant-numeric: tabular-nums;
            text-shadow: 0 0 8px color-mix(in srgb, var(--dock-accent, #60a5fa) 40%, transparent);
        }
        .dock-brand {
            display: flex; align-items: center; gap: 4px; padding-right: 5px; white-space: nowrap;
            font-family: 'Segoe UI Variable Display', 'Avenir Next', sans-serif;
            font-size: 11px; line-height: 1; font-weight: 800; letter-spacing: 0.6px;
            color: rgba(255,255,255,0.90);
            text-shadow: 0 0 6px rgba(255,255,255,0.60);
            cursor: pointer; -webkit-app-region: no-drag;
        }
        .dock-ring-shell:focus-visible, .dock-brand:focus-visible {
            outline: 1px solid color-mix(in srgb, var(--dock-accent, #60a5fa) 75%, white);
            outline-offset: 1px;
        }
        #dock-live-dot {
            display: block; width: 5px; height: 5px; border-radius: 50%; flex: 0 0 5px;
            background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.95);
            animation: pulse 2s infinite;
        }
        #dock-live-dot.offline { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.9); animation: none; }
        #dock-bg-switcher {
            position: absolute; right: 3px; top: 50%; z-index: 5;
            width: 10px; height: 34px; padding: 4px 2px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
            transform: translateY(-50%); border-radius: 999px; opacity: 0.58;
            cursor: pointer; touch-action: none;
            transition: opacity 0.2s ease, background 0.2s ease;
        }
        #dock-bg-switcher:hover, #dock-bg-switcher:focus-visible {
            opacity: 1; background: rgba(255,255,255,0.09); outline: none;
        }
        #dock-bg-switcher span {
            width: 3px; height: 3px; flex: 0 0 3px; border-radius: 50%;
            background: rgba(255,255,255,0.34);
            transition: height 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
        }
        #dock-bg-switcher span.active {
            height: 10px; flex-basis: 10px; border-radius: 999px;
            background: rgba(255,255,255,0.88); box-shadow: 0 0 5px rgba(255,255,255,0.34);
        }

        /* Window bounds morph in the main process. This short renderer reveal
           masks reflow while keeping the weather scene continuous underneath. */
        body.layout-transition.view-card #quota-app-container,
        body.layout-transition.view-mini #quota-app-container,
        body.layout-transition.view-mini #mini,
        body.layout-transition.view-dock #quota-app-container,
        body.layout-transition.view-dock #edge-dock {
            animation: layoutSurfaceReveal 0.3s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes layoutSurfaceReveal {
            0% { opacity: 0.35; filter: blur(1.5px) brightness(0.82); }
            55% { opacity: 0.86; filter: blur(0.25px) brightness(1.04); }
            100% { opacity: 1; filter: blur(0) brightness(1); }
        }
        @media (prefers-reduced-motion: reduce) {
            body.layout-transition.view-card #quota-app-container,
            body.layout-transition.view-mini #quota-app-container,
            body.layout-transition.view-mini #mini,
            body.layout-transition.view-dock #quota-app-container,
            body.layout-transition.view-dock #edge-dock { animation-duration: 0.01ms; }
            #edge-dock::after, #dock-live-dot { animation: none; }
        }

        /* ---- portrait mini card — the full weather scene remains underneath ---- */
        #mini {
            position: fixed; inset: 0; z-index: 20; box-sizing: border-box;
            flex-direction: column; align-items: center; -webkit-app-region: drag;
            border-radius: 30px; overflow: hidden; color: #fff; user-select: none;
            padding: 31px 24px 24px; cursor: grab;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.22);
        }
        #mini:active { cursor: grabbing; }
        #mini::before {
            content: ''; position: absolute; inset: 0; z-index: -1; pointer-events: none;
            background:
                linear-gradient(180deg, rgba(6,12,22,0.18) 0%, rgba(5,10,18,0.32) 48%, rgba(3,8,15,0.55) 100%),
                radial-gradient(circle at 50% 28%, rgba(255,255,255,0.10), rgba(0,0,0,0) 38%);
        }
        #mini .mini-top { display: flex; align-items: center; justify-content: center; gap: 8px; height: 28px; text-shadow: 0 2px 10px rgba(0,0,0,0.82); }
        #mini .mini-top { cursor: pointer; -webkit-app-region: no-drag; }
        #mini .mini-brand { font-size: 22px; line-height: 1; font-weight: 820; letter-spacing: -0.55px; }
        #mini-live-dot {
            width: 9px; height: 9px; border-radius: 50%; background: #4ADE80;
            box-shadow: 0 0 11px rgba(74,222,128,0.95); animation: pulse 2s infinite;
        }
        #mini-live-dot.offline { background: #F87171; box-shadow: 0 0 10px rgba(248,113,113,0.9); animation: none; }
        #mini .mini-ring {
            position: relative; width: 166px; height: 166px; margin-top: 24px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-app-region: no-drag;
        }
        #mini .mini-ring svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
        #mini-ring-fg { filter: drop-shadow(0 0 8px var(--mini-accent, rgba(90,148,232,0.62))); }
        #mini .mini-ring-copy { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 5px; text-shadow: 0 2px 9px rgba(0,0,0,0.88); }
        #mini .mini-pct { font-size: 38px; font-weight: 850; font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -1.2px; }
        #mini .mini-ring-label { font-size: 10px; font-weight: 750; letter-spacing: 1px; opacity: 0.74; }
        #mini .mini-metrics { width: 100%; margin-top: 29px; display: flex; flex-direction: column; align-items: center; }
        #mini .mini-metric { display: flex; flex-direction: column; align-items: center; gap: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.86); }
        #mini .mini-metric-label { font-size: 11px; font-weight: 700; letter-spacing: 1.15px; color: rgba(255,255,255,0.70); }
        #mini .mini-metric-value { font-size: 27px; line-height: 1; font-weight: 820; font-variant-numeric: tabular-nums; letter-spacing: -0.4px; }
        #mini .mini-divider { width: 48px; height: 1px; margin: 30px 0 27px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.48), transparent); }
        #mini .mini-mode-dots {
            margin-top: auto; margin-bottom: -14px; padding: 16px 24px 14px;
            display: flex; justify-content: center; gap: 7px; opacity: 0.62;
            border-radius: 999px; cursor: pointer; -webkit-app-region: no-drag;
            transition: opacity 0.2s ease, background 0.2s ease;
        }
        #mini .mini-mode-dots:hover, #mini .mini-mode-dots:focus-visible { opacity: 1; background: rgba(255,255,255,0.08); outline: none; }
        #mini .mini-mode-dots span { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.34); transition: width 0.25s ease, background 0.25s ease; }
        #mini .mini-mode-dots span.active { width: 12px; border-radius: 999px; background: rgba(255,255,255,0.86); }

        /* At the default 0.5 zoom these remain 10-12 physical pixels wide. */
        .view-mini .rz-n, .view-mini .rz-s { height: 20px; }
        .view-mini .rz-e, .view-mini .rz-w { width: 20px; }
        .view-mini .rz-ne, .view-mini .rz-nw, .view-mini .rz-se, .view-mini .rz-sw { width: 24px; height: 24px; }

        #quota-app-container {
            position: relative; width: 680px; height: 380px; border-radius: 24px; overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.22);
            color: #fff; background: #000;
            /* NOTE: no CSS transform here — a transform on any ancestor silently
               disables -webkit-app-region drag in Electron. Intro uses opacity only. */
            opacity: 0; animation: fadeAppIn 0.7s 0.1s ease forwards;
        }

        .bg-layer { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity 0.45s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 0; filter: brightness(0.9); }
        #bg-active { opacity: 1; }
        #bg-next { opacity: 0; }
        #quota-app-container[data-theme="blossom"] .bg-layer {
            filter: brightness(0.64) saturate(0.82) contrast(1.08);
        }
        #quota-app-container[data-theme="blossom"] .overlay {
            background:
                radial-gradient(circle at 68% 42%, rgba(109, 47, 83, 0.08) 0%, rgba(18, 10, 28, 0.58) 76%),
                linear-gradient(108deg, rgba(9, 8, 20, 0.82) 0%, rgba(48, 18, 43, 0.34) 52%, rgba(14, 9, 24, 0.68) 100%);
        }
        #quota-app-container[data-theme="snow"] .bg-layer {
            filter: brightness(0.62) saturate(0.72) contrast(1.08);
        }
        #quota-app-container[data-theme="snow"] .overlay {
            background:
                radial-gradient(circle at 72% 45%, rgba(91, 125, 160, 0.06) 0%, rgba(8, 17, 31, 0.56) 76%),
                linear-gradient(108deg, rgba(6, 13, 25, 0.84) 0%, rgba(20, 39, 58, 0.3) 54%, rgba(7, 16, 29, 0.66) 100%);
        }
        #quota-app-container[data-theme="beach"] .bg-layer {
            filter: brightness(0.64) saturate(0.76) contrast(1.1);
        }
        #quota-app-container[data-theme="beach"] .overlay {
            background:
                radial-gradient(circle at 70% 44%, rgba(72, 139, 154, 0.05) 0%, rgba(7, 22, 31, 0.56) 78%),
                linear-gradient(108deg, rgba(5, 17, 26, 0.86) 0%, rgba(16, 55, 66, 0.28) 54%, rgba(6, 20, 28, 0.66) 100%);
        }
        body.view-dock #quota-app-container .bg-layer {
            filter: brightness(0.84) saturate(1.08) contrast(1.14);
        }

        @keyframes fadeAppIn { to { opacity: 1; } }

        .overlay { position: absolute; inset: 0; background: radial-gradient(circle at 75% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%), linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.05) 100%); z-index: 1; pointer-events: none; }

        #weather-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; mix-blend-mode: screen; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); transition: opacity 0.6s ease; }
        #quota-app-container[data-theme="snow"] #weather-canvas,
        #quota-app-container[data-theme="beach"] #weather-canvas {
            mix-blend-mode: normal;
            filter: none;
        }
        .content { position: absolute; inset: 0; z-index: 10; padding: 30px 40px; display: flex; flex-direction: column; user-select: none; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }

        #click-zone { transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        #click-zone:hover { transform: scale(1.06); }
        #click-zone:hover circle#progress-ring { stroke-width: 14; filter: url(#svg-glow) brightness(1.3); }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; row-gap: 20px; column-gap: 36px; margin-right: 10px; }

        .metric-item { display: flex; flex-direction: column; gap: 5px; padding: 10px 14px; border-radius: 12px; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); border: 1px solid transparent; animation: fadeUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
        .metric-item:nth-child(1) { animation-delay: 0.3s; }
        .metric-item:nth-child(2) { animation-delay: 0.4s; }
        .metric-item:nth-child(3) { animation-delay: 0.5s; }
        .metric-item:nth-child(4) { animation-delay: 0.6s; }

        @keyframes fadeUpIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }

        .metric-item:hover { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

        .metric-label { font-size: 12px; color: rgba(255,255,255,0.9); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
        .metric-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }

        .header-title { margin: 0; font-size: 26px; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.8); letter-spacing: -0.5px; animation: fadeUpIn 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
        .layout-switch { cursor: pointer; -webkit-app-region: no-drag; }

        .theme-pill {
            padding: 7px 16px; border-radius: 30px; background: rgba(0,0,0,0.3); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.25); font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9); box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; display: flex; align-items: center; gap: 8px;
            animation: fadeUpIn 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
        .theme-pill:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.4); }
        .theme-pill:active { transform: translateY(1px); }

        @keyframes ring-breathe { 0% { filter: url(#svg-glow) opacity(0.85); } 50% { filter: url(#svg-glow) brightness(1.2) opacity(1); } 100% { filter: url(#svg-glow) opacity(0.85); } }
        #progress-ring { animation: ring-breathe 4s ease-in-out infinite; }

        #theme-name { pointer-events: none; display: inline-block; transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .name-out { opacity: 0; transform: translateY(-8px); }
        .name-in { opacity: 1; transform: translateY(0); }

        /* window controls */
        .win-btn {
            -webkit-app-region: no-drag; width: 26px; height: 26px; padding: 0; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.28); color: #fff; cursor: pointer;

    <script>
        const themes = [
            {
              id: 'rain', name: "Rainy Scenes", color: '#88B8FF',
              urls: [
                  '/assets/backgrounds/rain-0.jpg',
                  '/assets/backgrounds/rain-1.jpg',
                  '/assets/backgrounds/rain-2.jpg'
              ]
            },
            { id: 'meteor', name: "Kimi no Na wa", color: '#D4C4FF', urls: ['/assets/backgrounds/meteor-0.jpg', '/assets/backgrounds/meteor-1.jpg', '/assets/backgrounds/meteor-2.jpg'] },
            { id: 'blossom', name: "Spring Petals", color: '#F4B7CF', urls: ['/assets/backgrounds/blossom-0.jpg?v=sakura-3', '/assets/backgrounds/blossom-1.jpg?v=sakura-3', '/assets/backgrounds/blossom-2.jpg?v=sakura-3'] },
            {
              id: 'snow', name: "Silent Snow", color: '#CDE4FF',
              urls: [
                  '/assets/backgrounds/snow-0.jpg?v=winter-2',
                  '/assets/backgrounds/snow-1.jpg?v=winter-2',
                  '/assets/backgrounds/snow-2.jpg?v=winter-2'
              ]
            },
            { id: 'beach', name: "Ocean Breeze", color: '#75D5E8', urls: ['/assets/backgrounds/beach-0.jpg?v=ocean-2', '/assets/backgrounds/beach-1.jpg?v=ocean-2', '/assets/backgrounds/beach-2.jpg?v=ocean-2'] }
        ];

        let currentIdx = (function () {
            try {
                const requested = new URLSearchParams(location.search).get('theme');
                const index = themes.findIndex((theme) => theme.id === requested);
                if (index >= 0) return index;
            } catch (_) {}
            return 0;
        })();
        let bgIndices = new Array(themes.length).fill(0);
        try {
            const requestedBg = Number.parseInt(new URLSearchParams(location.search).get('bg'), 10);
            if (Number.isFinite(requestedBg) && themes[currentIdx].urls.length) {
                bgIndices[currentIdx] = Math.max(0, requestedBg) % themes[currentIdx].urls.length;
            }
        } catch (_) {}
        let requestedThemeIdx = currentIdx;
        let requestedBgIndices = bgIndices.slice();

        const canvas = document.getElementById('weather-canvas');
        const ctx = canvas.getContext('2d');
        const appContainer = document.getElementById('quota-app-container');
        const reduceMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
        let width = 680, height = 380;
        canvas.width = width; canvas.height = height;
        appContainer.dataset.theme = themes[currentIdx].id;

        function syncWeatherViewport(mode) {
            const target = mode === 'mini' ? { width: 240, height: 520 }
                : (mode === 'dock' ? { width: 128, height: 52 }
                    : (mode === 'card' ? { width: 680, height: 380 } : null));
            if (!target || (width === target.width && height === target.height)) return;
            width = target.width;
            height = target.height;
            canvas.width = width;
            canvas.height = height;
            resetParticles();
        }

        const backgroundLoads = new Map();
        function loadBackground(src) {
            if (backgroundLoads.has(src)) return backgroundLoads.get(src);
            const promise = new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(src);
                img.onerror = () => reject(new Error('Background failed to load: ' + src));
                img.src = src;
            });
            backgroundLoads.set(src, promise);
            promise.catch(() => backgroundLoads.delete(src));
            return promise;
        }
        themes.forEach((theme) => theme.urls.forEach((src) => loadBackground(src).catch(() => {})));

        // ---- background init (theme visuals) ----
        loadBackground(themes[currentIdx].urls[bgIndices[currentIdx]]).then((src) => {
            document.getElementById('bg-active').style.backgroundImage = "url('" + src + "')";
            document.getElementById('theme-name').innerText = themes[currentIdx].name;
            document.getElementById('progress-ring').style.stroke = themes[currentIdx].color;
            updateMiniBackgroundDots();

        function fmtInt(n) { return (n || 0).toLocaleString(); }

        function animateNum(id, from, to, fmt) {
            const el = document.getElementById(id); if (!el) return;
            if (DEMO_MODE) {
                el.innerHTML = fmt(to);

            let start = null; const dur = 900;
            const step = (ts) => {
                if (!start) start = ts;
                const p = Math.min((ts - start) / dur, 1);
                const ease = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
                const v = ease * (to - from) + from;
                el.innerHTML = fmt(v);
                if (p < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }

        function setRing(pct, fromPct) {
            const ring = document.getElementById('progress-ring');
            ring.style.strokeDashoffset = RING_CIRC * (1 - pct / 100);

            if (DEMO_MODE) {

            }
            let start = null; const dur = 1200;
            const step = (ts) => {
                if (!start) start = ts;
                const p = Math.min((ts - start) / dur, 1);
                const ease = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
                el.innerHTML = Math.round(ease * (pct - fromPct) + fromPct) + '%';

        function modeData(d, mode) {

        // "how old is this snapshot" → short human string

            if (m < 60) return m + t('age_min');

        function renderRingForMode() {

        // full render (called on new data AND on language switch).
        // The 4 metric cards always show REAL data: today's token usage (with a
        // context sub-line), the plan type, today's call count, and today's
        // session count. The ring (separately) shows the real weekly plan quota.
        function render(d) {
            lastData = d;
            const plan = d.plan || {};

            const lblUsed = document.getElementById('label-used');
            const lblLimit = document.getElementById('label-limit');
            const lblCalls = document.getElementById('label-calls');

            displayNums.used = d.daily.used;
            document.getElementById('val-context').innerText =
                fmtCompact(d.context.used) + ' / ' + fmtCompact(d.context.limit) + ' ctx';

            // card 2 — 套餐 (plan type)
            lblLimit.textContent = t('m_plan');
            const planKey = 'plan_' + (plan.planType || 'unknown');
            document.getElementById('val-limit').innerText =
                t(I18N[LANG][planKey] ? planKey : 'plan_unknown');
            document.getElementById('val-limit').style.fontSize = '18px';

            // card 3 — 今日调用 (calls today)
            lblCalls.textContent = t('m_calls');

            displayNums.calls = d.callsToday;

            // card 4 — 今日会话 (sessions today)
            lblReset.textContent = t('m_sessions');

        // Compact views share the live weekly percentage. The portrait keeps its
        // full ring and daily metrics; the edge dock intentionally shows only the
        // weekly quota so it stays quiet and readable at the screen edge.
        function updateCompactViews(d) {
            const pr = d.plan && d.plan.primary;
            const pct = Math.round(pr ? pr.remainingPct : (d.context ? d.context.remainingPct : 100));
            const dock = document.getElementById('edge-dock');
            const dockRing = document.getElementById('dock-ring-fg');
            const dockAccent = pct <= 10 ? '#F87171' : '#60A5FA';
            animateDockPercentage(pct);
            if (dock) dock.style.setProperty('--dock-accent', dockAccent);
            if (dockRing) dockRing.style.strokeDashoffset = 81.68 * (1 - pct / 100);

            // --- vertical mini card ---
            const mp = document.getElementById('mini-pct');
            if (mp) mp.innerText = pct + '%';
            const mr = document.getElementById('mini-ring-fg');
            if (mr) {
                const circ = 402.1; // 2*pi*64
                mr.style.transition = 'stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1), stroke 0.8s ease';
                mr.style.strokeDashoffset = circ * (1 - pct / 100);

                mr.setAttribute('stroke', miniAccent);
                mr.style.setProperty('--mini-accent', miniAccent + '99');

        let dockDisplayedPct = 0;
        let dockTargetPct = null;
        let dockPctAnimation = 0;
        function animateDockPercentage(target) {
            const el = document.getElementById('dock-pct-value');
            if (!el) return;
            target = Math.max(0, Math.min(100, Math.round(Number(target) || 0)));
            if (dockTargetPct === target && dockPctAnimation) return;
            cancelAnimationFrame(dockPctAnimation);
            dockTargetPct = target;
            const from = dockDisplayedPct;
            if (reduceMotion || from === target) {
                dockDisplayedPct = target;
                el.textContent = String(target);
                dockPctAnimation = 0;
                return;
            }
            const startedAt = performance.now();
            const duration = 1500;
            const step = (now) => {
                const progress = Math.min(1, (now - startedAt) / duration);
                const eased = 1 - Math.pow(1 - progress, 3);
                dockDisplayedPct = from + (target - from) * eased;
                el.textContent = String(Math.round(dockDisplayedPct));
                if (progress < 1) dockPctAnimation = requestAnimationFrame(step);
                else {
                    dockDisplayedPct = target;
                    el.textContent = String(target);
                    dockPctAnimation = 0;
                }
            };
            dockPctAnimation = requestAnimationFrame(step);
        }

        // ---- Electron shell integration -----------------------------------
        const SHELL = window.quotaShell || null;
        let pinned = true;
        let layoutTransitionTimer = null;
        let dockDragStartPoint = null;
        let dockDragged = false;
        let dockPullOutReady = false;
        let suppressDockClickUntil = 0;
        function shellClose(e) { if (e) e.stopPropagation(); if (SHELL) SHELL.close(); }
        function shellMinimize(e) { if (e) e.stopPropagation(); if (SHELL && SHELL.minimize) SHELL.minimize(); }
        function cycleLayout(e) { if (e) e.stopPropagation(); if (SHELL && SHELL.cycleView) SHELL.cycleView(); }
        function dockInteractionBlocked(e) {
            if (e) e.stopPropagation();

        function dockToggleWeather(e) {
            if (dockInteractionBlocked(e)) return;

        }
        function dockToggleLayout(e) {
            if (dockInteractionBlocked(e)) return;

        function dockDown(e) {
            if (e.button !== 0) return;
            e.stopPropagation();
            dockDragStartPoint = { x: e.screenX, y: e.screenY };
            dockDragged = false;
            dockPullOutReady = false;
            const target = e.currentTarget;
            const activationTarget = e.target && e.target.closest
                ? (e.target.closest('.dock-ring-shell') ? 'weather'
                    : (e.target.closest('.dock-brand') ? 'layout' : null))
                : null;
            try {
                if (target.setPointerCapture) target.setPointerCapture(e.pointerId);
            } catch (_) { /* synthetic tests and older Chromium may reject capture */ }
            if (SHELL && SHELL.dockDragStart) SHELL.dockDragStart({ x: e.screenX, y: e.screenY });
            const move = (ev) => {
                if (!dockDragStartPoint) return;
                if (Math.hypot(ev.screenX - dockDragStartPoint.x, ev.screenY - dockDragStartPoint.y) >= 3) dockDragged = true;
                const side = document.body.dataset.dockSide === 'left' ? 'left' : 'right';
                const horizontalDistance = side === 'left'
                    ? ev.screenX - dockDragStartPoint.x
                    : dockDragStartPoint.x - ev.screenX;
                dockPullOutReady = horizontalDistance >= 18;
                document.body.classList.toggle('dock-detached', dockPullOutReady);
                if (SHELL && SHELL.dockDragMove) SHELL.dockDragMove({ x: ev.screenX, y: ev.screenY });
            };
            const finish = (ev) => {
                if (!dockDragStartPoint) return;
                const cancelled = ev.type === 'pointercancel';
                if (!cancelled) move(ev);
                if (SHELL && SHELL.dockDragEnd) {
                    SHELL.dockDragEnd({
                        pullOut: !cancelled && dockPullOutReady,
                        cancelled,
                        point: cancelled
                            ? { x: dockDragStartPoint.x, y: dockDragStartPoint.y }
                            : { x: ev.screenX, y: ev.screenY }
                    });
                }
                if (cancelled || dockDragged) {
                    suppressDockClickUntil = Date.now() + 220;
                } else if (activationTarget) {
                    // Pointer capture retargets the following native click to
                    // the dock shell. Activate the original control here, then
                    // suppress that compatibility click to avoid a double fire.
                    suppressDockClickUntil = Date.now() + 220;
                    if (activationTarget === 'weather') toggleWeather();
                    else if (SHELL && SHELL.cycleView) SHELL.cycleView();
                }
                dockDragStartPoint = null;
                if (!dockPullOutReady) document.body.classList.remove('dock-detached');
                dockPullOutReady = false;
                target.removeEventListener('pointermove', move);
                target.removeEventListener('pointerup', finish);
                target.removeEventListener('pointercancel', finish);
                if (target.releasePointerCapture && target.hasPointerCapture && target.hasPointerCapture(ev.pointerId)) {
                    target.releasePointerCapture(ev.pointerId);
                }
            };
            target.addEventListener('pointermove', move);
            target.addEventListener('pointerup', finish);
            target.addEventListener('pointercancel', finish);
        }
        function dockWeatherKey(e) {
            if (e.key !== 'Enter' && e.key !== ' ') return;

        }
        function dockLayoutKey(e) {
            if (e.key !== 'Enter' && e.key !== ' ') return;

        function miniBackgroundKey(e) {

        function shellTogglePin(e) {
            if (e) e.stopPropagation();

        }
        // Portrait empty space drags the window; reaching a display edge lets the
        // main process convert it into the edge-docked quota tab.
        function compactDown(e) {
            if (e.button !== 0) return;

            e.preventDefault();

            const up = () => {
                if (SHELL && SHELL.compactDragEnd) SHELL.compactDragEnd();
                window.removeEventListener('mouseup', up);
            };
            window.addEventListener('mouseup', up);
        }
        // Main tells us which view to paint and which edge the dock is attached to.
        function setView(v, meta) {
            const mode = (v === 'dock' || v === 'mini') ? v : 'card';
            clearTimeout(layoutTransitionTimer);
            document.body.classList.remove('layout-transition');
            document.body.classList.remove('dock-detached');
            document.body.classList.remove('view-card', 'view-mini', 'view-dock');
            document.body.classList.add('view-' + mode);
            if (meta && (meta.side === 'left' || meta.side === 'right')) document.body.dataset.dockSide = meta.side;
            syncWeatherViewport(mode);
            if (lastData) { updateCompactViews(lastData); }
            // Restart the reveal animation even when layout switches happen in
            // quick succession; the main process animates the actual bounds.
            void document.body.offsetWidth;
            document.body.classList.add('layout-transition');
            layoutTransitionTimer = setTimeout(() => document.body.classList.remove('layout-transition'), 340);
        }
        if (SHELL && SHELL.onView) SHELL.onView(setView);
        function reflectPin(on) {
            pinned = on;
            const b = document.getElementById('btn-pin');
            if (!b) return;
            b.classList.toggle('pinned', !!on);
            b.title = on ? t('tip_pin_on') : t('tip_pin_off');
        }

        function updateMessageFor(state) {
            if (!state) return t('update_reading');
            const version = state.targetVersion || state.latestVersion || '';
            if (!state.managed || state.phase === 'unmanaged') return t('update_unmanaged');
            if (state.phase === 'available') return t('update_available') + (version ? '：v' + version : '');
            if (state.phase === 'downloading') return t('update_downloading') + ' v' + version + ' · ' + (state.progress || 0) + '%';
            if (state.phase === 'verifying') return t('update_verifying');
            if (state.phase === 'installing') return t('update_installing');
            if (state.phase === 'ready' || state.phase === 'restarting') return t('update_ready');
            if (state.phase === 'up-to-date') return t('update_up_to_date');
            if (state.phase === 'skipped') return t('update_skipped');
            if (state.phase === 'error') return state.message || t('update_retry');
            if (state.phase === 'checking') return LANG === 'zh' ? '正在检查 GitHub Release…' : 'Checking GitHub Releases…';
            return state.message || t('update_reading');
        }

        function versionRow(version, label, action, disabled) {
            const row = document.createElement('div');
            row.className = 'update-version';
            const text = document.createElement('span');
            text.textContent = 'v' + version;
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = label;
            button.disabled = !!disabled;
            if (!disabled) button.onclick = action;
            row.appendChild(text); row.appendChild(button);
            return row;
        }

        async function chooseVersion(version, installed) {
            if (!SHELL || !window.confirm(t('update_switch_confirm') + ' v' + version)) return;
            try {
                if (installed && SHELL.switchVersion) {
                    renderUpdateState(await SHELL.switchVersion(version));
                } else if (SHELL.downloadUpdate) {
                    renderUpdateState(await SHELL.downloadUpdate(version));
                }
            } catch (error) {
                renderUpdateState({ ...(currentUpdateState || {}), phase: 'error', message: error.message });
            }
        }

        function renderUpdateHistory(state) {
            const root = document.getElementById('update-history');
            if (!root) return;
            root.innerHTML = '';
            if (!state || !state.managed) return;
            const heading = document.createElement('div');
            heading.style.cssText = 'font-size:9px;font-weight:750;opacity:.56;margin-bottom:3px;text-transform:uppercase;letter-spacing:.7px';
            heading.textContent = t('update_history');
            root.appendChild(heading);
            const installed = Array.isArray(state.installed) ? state.installed : [];
            installed.forEach((entry) => {
                root.appendChild(versionRow(
                    entry.version,
                    entry.current ? t('update_current_badge') : (entry.switchable === false ? (LANG === 'zh' ? '应急备份' : 'fallback') : t('update_rollback')),
                    () => chooseVersion(entry.version, true),
                    entry.current || entry.switchable === false
                ));
            });
            const installedSet = new Set(installed.map((entry) => entry.version));
            (Array.isArray(state.releases) ? state.releases : [])
                .filter((entry) => !installedSet.has(entry.version))
                .slice(0, 4)
                .forEach((entry) => root.appendChild(versionRow(
                    entry.version,
                    t('update_get'),
                    () => chooseVersion(entry.version, false),
                    !entry.downloadable
                )));
        }

            if (!button || !current || !message || !primary || !skip || !bar || !fill || !popover) return;
            const phase = state ? state.phase : 'idle';
            const busy = ['downloading', 'verifying', 'installing', 'restarting'].includes(phase);
            const hasUpdate = phase === 'available' || phase === 'ready';
            const updatePhases = ['available', 'downloading', 'verifying', 'installing', 'ready', 'restarting'];
            const shouldShow = !!(state && state.managed && (
                updatePhases.includes(phase) || (phase === 'error' && state.targetVersion)
            ));
            button.classList.toggle('visible', shouldShow);

            primary.disabled = busy || !state || !state.managed;
            skip.classList.toggle('visible', phase === 'available' && !!(state && state.targetVersion));
            skip.textContent = t('update_skip');
            if (phase === 'available') primary.textContent = t('update_download') + ' v' + state.targetVersion;
            else if (phase === 'ready') primary.textContent = t('update_restart') + ' v' + state.targetVersion;

        async function drainTransitions() {
            if (transitionRunning) return;

            while (pendingTransition) {
                const target = pendingTransition;
                pendingTransition = null;
                await performTransition(target.themeIdx, target.bgIdx);
            }
            transitionRunning = false;

        function updateUIWithSmoothTransition(targetThemeIdx, targetBgIdx) {
            const themeIdx = targetThemeIdx == null ? requestedThemeIdx : targetThemeIdx;
            const count = themes[themeIdx].urls.length;
            const requestedBgIdx = targetBgIdx == null ? requestedBgIndices[themeIdx] : targetBgIdx;
            const bgIdx = ((requestedBgIdx % count) + count) % count;
            requestedThemeIdx = themeIdx;
            requestedBgIndices[themeIdx] = bgIdx;
            pendingTransition = {
                themeIdx,
                bgIdx,
            };
            drainTransitions();
        }

        function toggleWeather(source) {

        // =====================================================================

        let particles = []; let ripples = []; let activeLightnings = [];

                    });

            } else if (mode === 'meteor') {

                meteorRainTriggerNext = frameCount + 30;
            } else if (mode === 'beach') {

                for(let i=0; i<count; i++) {
                    particles.push({

                        y: height * (0.45 + Math.random() * 0.52),

                        opacity: 0.025 + Math.random() * 0.075,
                        speedX: 0.12 + Math.random() * 0.3,

        }

        function spawnMeteor(isSmallVolley) {
            if(isSmallVolley) {
                activeLightnings.push({
                    x: width + Math.random()*200, y: -(Math.random() * 100),
                    speedX: 1.2 + Math.random() * 0.5, speedY: 0.5 + Math.random() * 0.3,
                    length: 120 + Math.random() * 60, alpha: 0.6 + Math.random()*0.4,
                    decay: 0.002 + Math.random() * 0.001, w: 1.8 + Math.random() * 0.5,

                });
            } else {
                activeLightnings.push({
                    x: width + 50, y: -(Math.random() * 50),
                    speedX: 1.8 + Math.random() * 0.8, speedY: 0.8 + Math.random() * 0.4,
                    length: 350 + Math.random() * 150, alpha: 1.0,

        let frameCount = 0;
        function renderEngine() {
            ctx.clearRect(0,0,width,height);
            const mode = themes[currentIdx].id;
            frameCount++;
            let globalWind = Math.sin(frameCount / 180) * 0.3;

            if (mode === 'rain') {
                particles.forEach(p => {
                    ctx.save(); ctx.translate(p.x, p.y);
                    ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI, false);
                    ctx.bezierCurveTo(-p.r*0.9, -p.l*0.4, -p.r*0.2, -p.l*0.8, -p.r*0.05, -p.l); ctx.bezierCurveTo(p.r*0.05, -p.l*0.8, p.r*0.8, -p.l*0.4, p.r, 0); ctx.closePath();
                    let dropGrad = ctx.createRadialGradient(0, p.r*0.5, 0, 0, 0, p.r*1.2); let alphaFactor = Math.min(1.0, p.r * 0.6);
                    dropGrad.addColorStop(0, "rgba(255, 255, 255, " + (0.05*alphaFactor) + ")"); dropGrad.addColorStop(0.7, "rgba(255, 255, 255, " + (0.3*alphaFactor) + ")"); dropGrad.addColorStop(1, "rgba(255, 255, 255, " + (0.8*alphaFactor) + ")");
                    ctx.fillStyle = dropGrad; ctx.fill();
                    if (p.r > 1.0) { ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; ctx.beginPath(); ctx.ellipse(-p.r*0.35, p.r*0.35, p.r*0.2, p.r*0.4, Math.PI/4, 0, Math.PI*2); ctx.fill(); }
                    ctx.restore(); p.y += p.s;
                    if(p.y > height - 15) {
                        if (p.r > 1.2) ripples.push({x: p.x, y: height - 15, r: 1.5, op: 0.8, speed: 0.12 + Math.random()*0.08});
                        p.y = -(Math.random() * 200 + 20); p.x = Math.random()*width;
                    }
                });
                ripples.forEach((r, i) => {
                    ctx.strokeStyle = "rgba(255, 255, 255, " + Math.max(0, r.op) + ")"; ctx.lineWidth = 0.8;
                    ctx.beginPath(); ctx.ellipse(r.x, r.y, r.r + 2, (r.r + 2)*0.18, 0, 0, Math.PI*2); ctx.stroke();
                    r.r += r.speed; r.op -= 0.005; if(r.op <= 0) ripples.splice(i, 1);
                });
            }
            else if (mode === 'snow') {
                const snowGust = reduceMotion ? 0 : Math.sin(frameCount / 230) * 0.16 + Math.sin(frameCount / 91) * 0.04;
                particles.forEach(p => {
                    const drift = Math.sin(frameCount * p.waveSpeed + p.phase);
                    const alpha = p.opacity * (0.9 + Math.abs(drift) * 0.1);
                    const r = p.r;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.scale(1, p.flatten);
                    ctx.filter = p.depth < 0.22 ? 'blur(0.55px)' : (p.depth > 0.82 ? 'blur(0.18px)' : 'none');
                    const grad = ctx.createRadialGradient(-r * 0.18, -r * 0.18, 0, 0, 0, r);
                    grad.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
                    grad.addColorStop(0.62, `rgba(235, 246, 255, ${alpha * 0.86})`);
                    grad.addColorStop(1, 'rgba(220, 238, 252, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, r, r * 0.82, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    p.x += snowGust * (0.55 + p.depth) + drift * p.sway * 0.12;
                    p.y += p.speedY;
                    p.rotation += p.spin;
                    if(p.y > height + 18 || p.x < -45 || p.x > width + 45) {
                        p.y = -12 - Math.random() * 55;
                        p.x = Math.random() * (width + 60) - 30;
                        p.phase = Math.random() * Math.PI * 2;
                    }
                });
            }
            else if (mode === 'blossom') {
                const blossomGust = reduceMotion ? 0 : Math.sin(frameCount / 170) * 0.18 + Math.max(0, Math.sin(frameCount / 390)) * 0.32;
                particles.forEach(p => {
                    const flutter = Math.sin(frameCount * p.flutterSpeed + p.phase);
                    const rollScale = 0.22 + Math.abs(Math.cos(p.roll)) * 0.78;
                    const alpha = p.opacity * (0.88 + flutter * 0.12);
                    const [red, green, blue] = p.color;
                    const r = p.r;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation + flutter * 0.22);
                    ctx.scale(0.78 + p.depth * 0.2, rollScale);
                    ctx.filter = p.depth < 0.25 ? 'blur(0.45px)' : 'none';
                    if (p.depth > 0.72) {
                        ctx.shadowBlur = 5 + p.depth * 4;
                        ctx.shadowColor = 'rgba(239, 146, 183, 0.28)';
                    }

                    const petalFill = ctx.createLinearGradient(0, -r, 0, r);
                    petalFill.addColorStop(0, `rgba(${red}, ${green}, ${blue}, ${alpha * 0.82})`);
                    petalFill.addColorStop(0.58, `rgba(${red}, ${green}, ${blue}, ${alpha})`);
                    petalFill.addColorStop(1, `rgba(231, 151, 183, ${alpha * 0.86})`);
                    ctx.fillStyle = petalFill;
                    ctx.beginPath();
                    ctx.moveTo(0, r * 0.96);
                    ctx.bezierCurveTo(r * 0.76, r * 0.58, r * 1.04, -r * 0.18, r * 0.46, -r * 0.88);
                    ctx.bezierCurveTo(r * 0.24, -r * 0.68, r * 0.12, -r * 0.48, 0, -r * 0.36);
                    ctx.bezierCurveTo(-r * 0.12, -r * 0.48, -r * 0.24, -r * 0.68, -r * 0.46, -r * 0.88);
                    ctx.bezierCurveTo(-r * 1.04, -r * 0.18, -r * 0.76, r * 0.58, 0, r * 0.96);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = `rgba(184, 91, 128, ${alpha * 0.24})`;
                    ctx.lineWidth = 0.45;
                    ctx.beginPath();
                    ctx.moveTo(0, r * 0.64);
                    ctx.quadraticCurveTo(flutter * r * 0.08, r * 0.08, 0, -r * 0.28);
                    ctx.stroke();
                    ctx.restore();

                    p.x += p.speedX + blossomGust * (0.55 + p.depth) + flutter * p.sway * 0.13;
                    p.y += p.speedY * (0.9 + Math.abs(flutter) * 0.24);
                    p.rotation += p.spin;
                    p.roll += p.rollSpeed;

                    if (p.y > height + 24 || p.x > width + 34 || p.x < -50) {
                        p.y = -18 - Math.random() * 70;
                        p.x = Math.random() * (width + 60) - 30;
                        p.phase = Math.random() * Math.PI * 2;
                    }
                });
            }
            else if (mode === 'meteor') {
                particles.forEach((p) => {
                    let opacity = 0.1 + Math.abs(Math.sin(frameCount * p.speed + p.phase)) * 0.8;
                    ctx.fillStyle = "rgba(255, 255, 255, " + opacity + ")";
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                });

                if (Math.random() < 0.003 && activeLightnings.length < 2) {
                    spawnMeteor(false);
                }

                if (frameCount > meteorRainTriggerNext) {
                    let numMeteors = Math.floor(Math.random() * 4) + 3;
                    for(let i=0; i<numMeteors; i++) spawnMeteor(true);
                    meteorRainTriggerNext = frameCount + 300 + Math.random()*600;
                }

                activeLightnings.forEach((m, i) => {
                    const tailX = m.x + m.length; const tailY = m.y - m.length * (m.speedY / m.speedX);

                    ctx.shadowBlur = m.isSingleHuge ? 40 : 20;
                    ctx.shadowColor = "rgba(180, 200, 255, 1)";

                    const grad = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
                    grad.addColorStop(0, "rgba(255, 255, 255, " + (m.alpha) + ")");
                    grad.addColorStop(0.1, "rgba(169, 204, 255, " + (m.alpha * 0.8) + ")");
                    grad.addColorStop(0.4, "rgba(206, 147, 216, " + (m.alpha * 0.4) + ")");
                    grad.addColorStop(1, "rgba(255, 255, 255, 0)");

                    ctx.strokeStyle = grad; ctx.lineWidth = m.w;
                    ctx.lineCap = 'butt';

                    ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(tailX, tailY); ctx.stroke();

                    if (m.isSingleHuge && m.alpha > 0.4 && Math.random() > 0.3) {
                       let sepY = Math.sin(frameCount * 0.5 + m.splitPhase) * (15 + m.w*2);
                       let sepAlpha = m.alpha * 0.6;
                       ctx.strokeStyle = "rgba(255, 150, 200, " + sepAlpha + ")";
                       ctx.lineWidth = m.w * 0.4;
                       ctx.lineCap = 'butt';
                       ctx.beginPath(); ctx.moveTo(m.x + 40, m.y - sepY); ctx.lineTo(tailX, tailY - sepY * 2.5); ctx.stroke();
                    }

                    ctx.shadowBlur = 0;

                    m.x -= m.speedX; m.y += m.speedY; m.alpha -= m.decay;
                    if (m.alpha <= 0 || m.x < -400 || m.y > height+300) activeLightnings.splice(i, 1);
                });
            }
            else if (mode === 'beach') {
                particles.forEach(p => {
                    const wave = Math.sin(frameCount * p.waveSpeed + p.phase);
                    const startX = p.x;
                    const endX = p.x + p.length;
                    const endY = p.y + wave * p.waveHeight;
                    const mist = ctx.createLinearGradient(startX, p.y, endX, endY);
                    mist.addColorStop(0, 'rgba(210, 240, 244, 0)');
                    mist.addColorStop(0.45, `rgba(220, 246, 248, ${p.opacity})`);
                    mist.addColorStop(1, 'rgba(210, 240, 244, 0)');
                    ctx.strokeStyle = mist;
                    ctx.lineWidth = p.thickness;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(startX, p.y);
                    ctx.bezierCurveTo(
                        startX + p.length * 0.32, p.y - wave * p.waveHeight,
                        startX + p.length * 0.68, p.y + wave * p.waveHeight,
                        endX, endY
                    );
                    ctx.stroke();

                    p.x += p.speedX;
                    if (p.x > width + 30) {
                        p.x = -p.length - Math.random() * 80;
                        p.y = height * (0.45 + Math.random() * 0.52);
                        p.phase = Math.random() * Math.PI * 2;
                    }
                });
            }
            requestAnimationFrame(renderEngine);
        }

        resetParticles();
        renderEngine();
    </script>
</body>
</html>
